# Fake GPU extended resources on every node via node status patches.
#
# Each node advertises all four chip types simultaneously, matching
# real GCP GPU-per-node counts:
#   H200: 8  (a3-ultragpu-8g)
#   H100: 8  (a3-highgpu-8g)
#   A100: 16 (a2-megagpu-16g)
#   L40S: 4  (g4-standard-48)
#
# This is unrealistic (real nodes have one chip type) but lets us test
# multi-accelerator scheduling on cheap e2-micro spot VMs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mock-chips
  namespace: scheduler-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mock-chips
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mock-chips
subjects:
  - kind: ServiceAccount
    name: mock-chips
    namespace: scheduler-system
roleRef:
  kind: ClusterRole
  name: mock-chips
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mock-chips
  namespace: scheduler-system
spec:
  selector:
    matchLabels:
      app: mock-chips
  template:
    metadata:
      labels:
        app: mock-chips
    spec:
      serviceAccountName: mock-chips
      tolerations:
        - key: scheduler.example.com/managed
          operator: Exists
          effect: NoSchedule
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                kubectl patch node "$NODE_NAME" --subresource=status --type=json -p '[
                  {"op":"add","path":"/status/capacity/example.com~1H200","value":"8"},
                  {"op":"add","path":"/status/capacity/example.com~1H100","value":"8"},
                  {"op":"add","path":"/status/capacity/example.com~1A100","value":"16"},
                  {"op":"add","path":"/status/capacity/example.com~1L40S","value":"4"}
                ]' 2>/dev/null
                sleep 10
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
