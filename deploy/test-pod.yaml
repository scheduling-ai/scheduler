# Test Pod that uses our custom scheduler.
# Submit via the scheduler API:
#   curl -X POST http://scheduler:8080/jobs -H 'Content-Type: application/json' -d @test-pod.yaml
#
# The scheduler will:
# 1. Hold this Pod in its central store.
# 2. When the solver places it, create it on the target cluster with
#    node affinity injected.
# 3. On suspension, the Pod is deleted from the cluster and re-enters
#    the store pinned to that cluster.
apiVersion: v1
kind: Pod
metadata:
  name: test-gpu-pod
  labels:
    accelerator: h100
    scheduler.example.com/job-name: test-gpu-pod
  annotations:
    scheduler.example.com/priority: "0"
    scheduler.example.com/quota: "default"
spec:
  containers:
    - name: busybox
      image: busybox
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
  restartPolicy: Never
